<!doctype html>
<html lang="en">
  <head>
    <title>WebGi starter</title>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"

  </head>

  <body>
    <div id="webgi-canvas-container">
      <canvas id="webgi-canvas"></canvas>
      <div id="model-name"></div>
      <div id="ui-icons">
        <img
          src="/assets/helmet-CcUQU9eC.png"
          onclick="loadModel('helmet')"
          alt="helmet"
        />
        <img
          src="/assets/exhaust-DJ1OdcE4.png"
          onclick="loadModel('exhaust')"
          alt="exhaust"
        />
        <img
          src="/assets/fueltank-D3cRhY78.png"
          onclick="loadModel('fueltank')"
          alt="fueltank"
        />
        <img
          src="/assets/jacket-DDgxDzf1.png"
          onclick="loadModel('jacket')"
          alt="jacket"
        />
        <img
          src="/assets/mirror-vfOJb3Z_.png"
          onclick="loadModel('mirror')"
          alt="mirror"
        />
        <img
          src="/assets/suspension-CEpohV7y.png"
          onclick="loadModel('suspension')"
          alt="suspension"
        />
      </div>
      <!-- Loader with progress bar -->
      <div id="loaderDiv" class="loader">
        <div class="loader-content">
          <h2>Loading 3D Model...</h2>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>

      <div id="auto-rotate-toggle" onclick="autorotate()">

          alt="Auto Rotate"

          alt="Play Animation"
